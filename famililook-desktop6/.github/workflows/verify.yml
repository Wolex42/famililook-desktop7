# NFR-REG-1-FE: Regression Gate - No commit unless verify is green
# FamiliMatch (desktop6) CI pipeline

name: Verify

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

  contract-tests:
    name: Contract Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm run test:run -- --grep "contract"
